<!DOCTYPE html>
<html lang="en">
<!--
  La-Z-Boy Email Template
  =======================
  Base HTML email template with La-Z-Boy brand applied.
  Max width: 600px. Compatible with major email clients.

  Usage:
  - Replace [SUBJECT], [HEADLINE], [BODY_CONTENT], [CTA_TEXT], [CTA_URL]
  - Keep the structure intact — only replace content inside marked sections
  - Do not change font stacks, colors, or layout structure
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[SUBJECT]</title>
  <style>
    /* Reset */
    body, table, td, p, a, li, blockquote {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: #F0EDE8; /* Slightly darker than Warm White for email bg */
      font-family: Helvetica, Arial, sans-serif; /* Email-safe fallback */
    }
    table { border-collapse: collapse; }
    img { border: 0; display: block; }
    a { color: #1B3A6B; text-decoration: underline; }

    /* Brand colors */
    .bg-primary   { background-color: #1B3A6B; }
    .bg-accent    { background-color: #C0392B; }
    .bg-warm      { background-color: #FAF8F5; }
    .text-primary { color: #1B3A6B; }
    .text-charcoal{ color: #2C2C2C; }
    .text-white   { color: #FFFFFF; }
    .text-light   { color: rgba(44,44,44,0.6); }
  </style>
</head>
<body>
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
    <tr>
      <td align="center" style="padding: 24px 16px;">

        <!-- Email container: max 600px -->
        <table width="600" cellpadding="0" cellspacing="0" role="presentation"
               style="max-width:600px; width:100%;">

          <!-- ── HEADER ─────────────────────────────────────────────── -->
          <tr>
            <td class="bg-primary" style="padding: 24px 32px; border-radius: 8px 8px 0 0;">
              <!-- Replace with actual logo <img> tag sourced from brand portal -->
              <p style="margin:0; color:#FFFFFF; font-family:Helvetica,Arial,sans-serif;
                         font-size:22px; font-weight:700; letter-spacing:-0.3px;">
                La-Z-Boy
              </p>
              <!-- PRODUCTION: Replace above <p> with:
              <img src="[LOGO_URL]" width="120" alt="La-Z-Boy" style="display:block;">
              -->
            </td>
          </tr>

          <!-- ── HERO / HEADLINE ────────────────────────────────────── -->
          <tr>
            <td class="bg-warm" style="padding: 40px 32px 24px;">
              <h1 style="margin:0 0 12px; font-family:Helvetica,Arial,sans-serif;
                          font-size:28px; font-weight:700; color:#1B3A6B; line-height:1.3;">
                [HEADLINE]
              </h1>
              <p style="margin:0; font-family:Helvetica,Arial,sans-serif;
                         font-size:15px; color:#2C2C2C; line-height:1.6;">
                [SUBHEADLINE — optional one-sentence summary]
              </p>
            </td>
          </tr>

          <!-- ── BODY CONTENT ───────────────────────────────────────── -->
          <tr>
            <td class="bg-warm" style="padding: 0 32px 32px;">
              <!-- Replace this section with your email body content -->
              <p style="margin:0 0 16px; font-family:Helvetica,Arial,sans-serif;
                         font-size:15px; color:#2C2C2C; line-height:1.6;">
                [BODY_CONTENT — paragraph 1]
              </p>
              <p style="margin:0 0 24px; font-family:Helvetica,Arial,sans-serif;
                         font-size:15px; color:#2C2C2C; line-height:1.6;">
                [BODY_CONTENT — paragraph 2]
              </p>

              <!-- ── CTA BUTTON ───────────────────────────────────��� -->
              <table cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td class="bg-accent"
                      style="border-radius:4px; background-color:#C0392B;">
                    <a href="[CTA_URL]"
                       style="display:inline-block; padding:12px 28px;
                              font-family:Helvetica,Arial,sans-serif;
                              font-size:15px; font-weight:600; color:#FFFFFF;
                              text-decoration:none; border-radius:4px;">
                      [CTA_TEXT]
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ── DIVIDER ────────────────────────────────────────────── -->
          <tr>
            <td class="bg-warm" style="padding: 0 32px;">
              <hr style="border:none; border-top:1px solid rgba(27,58,107,0.15); margin:0;">
            </td>
          </tr>

          <!-- ── FOOTER ─────────────────────────────────────────────── -->
          <tr>
            <td class="bg-warm" style="padding: 24px 32px; border-radius: 0 0 8px 8px;">
              <p style="margin:0 0 8px; font-family:Helvetica,Arial,sans-serif;
                         font-size:12px; color:rgba(44,44,44,0.6); line-height:1.5;">
                © La-Z-Boy Incorporated. All rights reserved.<br>
                [COMPANY_ADDRESS]
              </p>
              <p style="margin:0; font-family:Helvetica,Arial,sans-serif;
                         font-size:12px; line-height:1.5;">
                <a href="[UNSUBSCRIBE_URL]"
                   style="color:#1B3A6B; text-decoration:underline;">Unsubscribe</a>
                &nbsp;|&nbsp;
                <a href="[PRIVACY_URL]"
                   style="color:#1B3A6B; text-decoration:underline;">Privacy Policy</a>
              </p>
            </td>
          </tr>

        </table>
        <!-- end 600px container -->

      </td>
    </tr>
  </table>
</body>
</html>
