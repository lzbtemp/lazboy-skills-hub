# La-Z-Boy Python Project Template
# Copy this file to the root of your new project as pyproject.toml
# Then replace all [REPLACE_ME] placeholders with your project details.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lazboy-[REPLACE_ME]"             # e.g., lazboy-product-api
version = "0.1.0"
description = "[REPLACE_ME: one sentence describing this service]"
requires-python = ">=3.12"
dependencies = [
    # Add runtime deps here:
    # "httpx>=0.27",
    # "pydantic>=2.7",
    # "fastapi>=0.111",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "pyright>=1.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/lazboy_[REPLACE_ME]"]   # e.g., src/lazboy_product_api

# --- Ruff (linting + formatting) ---
[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "S", "ANN", "RUF"]
ignore = [
    "ANN101",  # self type annotation — not needed
    "ANN102",  # cls type annotation — not needed
    "S101",    # assert — allowed in tests
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ANN"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# --- Pyright (type checking) ---
[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "standard"
include = ["src"]
venvPath = "."
venv = ".venv"

# --- pytest ---
[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-fail-under=80",
    "-v",
]

[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*", "*/__init__.py"]

[tool.coverage.report]
show_missing = true
skip_covered = true
